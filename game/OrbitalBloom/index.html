<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Orbital Bloom</title>
  <link rel="stylesheet" href="orbital-bloom.css">
</head>
<body>

  <canvas id="c"></canvas>

  <button id="btn-pause" aria-label="Pause">&#9208;</button>
  <a href="../../app.html" id="btn-back">&larr; Back</a>

  <p id="hint">Click &amp; hold to spawn a planet &nbsp;&middot;&nbsp; longer hold = bigger planet</p>

  <div id="size-ind" class="hidden" aria-hidden="true">
    <span id="size-lbl">Size</span>
    <div id="size-wrap"><div id="size-fill"></div></div>
  </div>

  <!-- Intro overlay -->
  <div class="ov" id="ov-intro" role="dialog" aria-modal="true" aria-labelledby="intro-title">
    <h1 class="ov-title" id="intro-title">Orbital Bloom</h1>
    <p class="ov-sub">Click &amp; hold to spawn a planet &nbsp;&middot;&nbsp; longer hold = bigger</p>
    <button class="btn-pill" id="btn-start">Begin</button>
  </div>

  <!-- Pause overlay -->
  <div class="ov hidden" id="ov-pause" role="dialog" aria-modal="true" aria-labelledby="pause-title">
    <h2 class="ov-title" id="pause-title">Paused</h2>
    <p class="ov-sub">The universe waits.</p>
    <button class="btn-pill" id="btn-resume">Resume</button>
    <button class="btn-ghost" id="btn-rp">Restart</button>
  </div>

  <script src="orbital-bloom.js"></script>
</body>
</html>
