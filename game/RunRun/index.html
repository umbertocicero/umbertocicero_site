<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="landscape">
  <meta name="description" content="Run Run 8-bit — retro pixel-art platformer. Tap to jump, collect coins, avoid obstacles!">
  <title>Run Run 8‑bit</title>
  <link rel="icon" href="../../img/favicon.png">
  <link rel="stylesheet" href="run-run.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- Portrait rotation prompt -->
  <div class="rotate-msg">
    <div class="icon">📱🔄</div>
    <div>Rotate your device<br>to landscape mode</div>
  </div>

  <!-- Character select overlay -->
  <div id="charSelect" class="overlay hidden">
    <div class="char-panel">
      <h2>Choose your character</h2>
      <div class="char-options">
        <button class="char-btn selected" data-char="man"><img src="assets/img/characters/preview_man.png" alt="Man"><span>Man</span></button>
        <button class="char-btn" data-char="girl"><img src="assets/img/characters/preview_girl.png" alt="Girl"><span>Girl</span></button>
        <button class="char-btn" data-char="dragon"><img src="assets/img/characters/preview_dragon.png" alt="Dragon"><span>Dragon</span></button>
      </div>
      <button class="play-btn" id="startBtn">▶ PLAY</button>
    </div>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
