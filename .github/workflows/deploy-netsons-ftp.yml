name: Deploy to Netsons FTP

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: umbertocicero_site

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit belongs to default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -z "$DEFAULT_BRANCH" ]; then
            echo "Cannot detect repository default branch."
            exit 1
          fi

          git fetch origin "$DEFAULT_BRANCH" --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "Tag $GITHUB_REF_NAME is not on $DEFAULT_BRANCH. Deployment skipped."
            exit 1
          fi

      - name: Validate FTP secrets
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          if [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "Missing FTP_USER or FTP_PASS in environment secrets."
            exit 1
          fi

      - name: Resolve FTP settings
        id: ftp
        env:
          FTP_SERVER_VAR: ${{ vars.FTP_SERVER }}
          FTP_PROTOCOL_VAR: ${{ vars.FTP_PROTOCOL }}
          FTP_PORT_VAR: ${{ vars.FTP_PORT }}
        run: |
          SERVER="${FTP_SERVER_VAR:-ftp.umbertocicero.com}"
          PROTOCOL="${FTP_PROTOCOL_VAR:-ftp}"
          PORT="${FTP_PORT_VAR:-21}"

          if [ "$PROTOCOL" != "ftp" ] && [ "$PROTOCOL" != "ftps" ]; then
            echo "FTP_PROTOCOL must be 'ftp' or 'ftps'. Current: $PROTOCOL"
            exit 1
          fi

          echo "server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "protocol=$PROTOCOL" >> "$GITHUB_OUTPUT"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.ftp.outputs.server }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          port: ${{ steps.ftp.outputs.port }}
          local-dir: ./
          server-dir: /
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**
            **/*.log
